<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/css/menu.css">
    <link rel="stylesheet" href="assets/css/transition.css">
    <link rel="stylesheet" href="assets/css/skills.css">
</head>
<body>
    <div class="cursor-glow" aria-hidden="true"></div>
    <div class="menu-scene" aria-hidden="true">
        <div class="ambient ambient-one"></div>
        <div class="ambient ambient-two"></div>
        <div class="ambient ambient-three"></div>
        <div class="particle-field">
            <span class="particle particle-1"></span>
            <span class="particle particle-2"></span>
            <span class="particle particle-3"></span>
            <span class="particle particle-4"></span>
            <span class="particle particle-5"></span>
            <span class="particle particle-6"></span>
        </div>
    </div>

    <main class="page-shell" role="main">
        <div class="hud hud-top-right">ONLINE</div>

        <a class="back-link" href="index.html" data-transition-label="RETURNING TO MENU...">← MAIN MENU</a>

        <header class="page-heading">
            <h1 class="page-heading__title">SKILLS</h1>
            <p class="page-heading__subtitle">Technical Arsenal</p>
        </header>

        <section class="skills-panel" aria-label="Technical skills">
            <div class="skill-item"><div class="skill-item__top"><span>HTML</span><span>92%</span></div><div class="skill-bar"><div class="skill-bar__fill" data-value="92"></div></div></div>
            <div class="skill-item"><div class="skill-item__top"><span>CSS</span><span>90%</span></div><div class="skill-bar"><div class="skill-bar__fill" data-value="90"></div></div></div>
            <div class="skill-item"><div class="skill-item__top"><span>JavaScript</span><span>88%</span></div><div class="skill-bar"><div class="skill-bar__fill" data-value="88"></div></div></div>
            <div class="skill-item"><div class="skill-item__top"><span>PHP</span><span>78%</span></div><div class="skill-bar"><div class="skill-bar__fill" data-value="78"></div></div></div>
            <div class="skill-item"><div class="skill-item__top"><span>MySQL</span><span>74%</span></div><div class="skill-bar"><div class="skill-bar__fill" data-value="74"></div></div></div>
            <div class="skill-item"><div class="skill-item__top"><span>Python</span><span>82%</span></div><div class="skill-bar"><div class="skill-bar__fill" data-value="82"></div></div></div>
            <div class="skill-item"><div class="skill-item__top"><span>Git</span><span>86%</span></div><div class="skill-bar"><div class="skill-bar__fill" data-value="86"></div></div></div>
            <div class="skill-item"><div class="skill-item__top"><span>Responsive Design</span><span>95%</span></div><div class="skill-bar"><div class="skill-bar__fill" data-value="95"></div></div></div>
        </section>

        <div class="hud hud-bottom-left">SYSTEM READY</div>
        <div class="hud hud-bottom-right">
            <span>Version 1.0</span>
            <span id="clock">00:00:00</span>
        </div>
    </main>

    <script src="assets/js/menu.js"></script>
    <script src="assets/js/transition.js"></script>
    <script src="assets/js/skills.js"></script>
</body>
</html>
